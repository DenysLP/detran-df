---
# collections/requirements.yml
# Coleções necessárias pelas roles. O AAP resolve isso ao sincronizar o Project
# (ou já vêm na Execution Environment padrão).
collections:
  - name: ansible.posix      # firewalld (linux_zabbix_agent, RHEL)
  - name: community.general  # timezone (linux_ntp) e ufw (linux_zabbix_agent, Debian/Ubuntu)
  - name: ansible.windows    # win_ping / win_updates / win_powershell / win_copy (windows_checkup)
  - name: nutanix.ncp        # ntnx_clusters_info etc. (nutanix-validate) — provider Nutanix/Prism Central
