# Inventário de exemplo. No AAP, use um Inventory dinâmico/estático próprio.
# O grupo [rhel] é o alvo dos playbooks de exemplo (vale para RHEL 7/8/9/10).

[rhel]
srv-rhel7-01 ansible_host=10.0.10.7
srv-rhel8-01 ansible_host=10.0.10.8
srv-rhel9-01 ansible_host=10.0.10.9
srv-rhel10-01 ansible_host=10.0.10.10

[rhel:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
