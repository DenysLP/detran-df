# Inventário de exemplo. No AAP, use um Inventory dinâmico/estático próprio.
# O grupo [linux] é o alvo dos playbooks de exemplo e reúne RHEL, Debian e Ubuntu.

[rhel]
srv-rhel8-01 ansible_host=10.0.10.8
srv-rhel9-01 ansible_host=10.0.10.9

[debian]
srv-debian12-01 ansible_host=10.0.11.12

[ubuntu]
srv-ubuntu2204-01 ansible_host=10.0.12.22

[linux:children]
rhel
debian
ubuntu

[linux:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
