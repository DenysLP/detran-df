---
# playbooks/zabbix-agent.yml — exemplo de uso da role linux_zabbix_agent (RHEL / Debian / Ubuntu)
# Dica AAP: guarde o PSK secret em um Vault Credential e injete via extra_vars.

- name: Instalar e configurar zabbix-agent2 em hosts Linux
  hosts: linux
  become: true
  vars:
    linux_zabbix_agent_major: "7.0"
    linux_zabbix_agent_server: "zabbix.detran.df.gov.br"
    linux_zabbix_agent_server_active: "zabbix.detran.df.gov.br"
    linux_zabbix_agent_hostname: "{{ inventory_hostname }}"
    linux_zabbix_agent_host_metadata: "linux:detran-df"
    linux_zabbix_agent_manage_firewall: true
    # TLS/PSK (produção) — mantenha o secret em ansible-vault:
    # linux_zabbix_agent_tls_connect: psk
    # linux_zabbix_agent_tls_accept: psk
    # linux_zabbix_agent_tls_psk_identity: "PSK-DETRAN-DF"
    # linux_zabbix_agent_tls_psk_secret: "{{ vault_zabbix_psk }}"
  roles:
    - role: linux_zabbix_agent
