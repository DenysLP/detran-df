---
# playbooks/ntp.yml — exemplo de uso da role linux_ntp (RHEL / Debian / Ubuntu)

- name: Configurar NTP (chrony) em hosts Linux
  hosts: linux
  become: true
  vars:
    linux_ntp_servers:
      - a.st1.ntp.br
      - b.st1.ntp.br
      - c.st1.ntp.br
    linux_ntp_timezone: "America/Sao_Paulo"
    # Exemplo: este host também serve tempo para a rede interna do DETRAN-DF.
    linux_ntp_allow_networks:
      - 10.0.0.0/8
  roles:
    - role: linux_ntp
