---
# playbooks/packages.yml — exemplo de uso da role linux_packages (RHEL / Debian / Ubuntu)

- name: Garantir baseline de pacotes em hosts Linux
  hosts: linux
  become: true
  vars:
    # A baseline (vim/wget/curl/tar/unzip/bash-completion) já é aplicada com os nomes
    # corretos por família. Aqui vão pacotes adicionais que existem tanto em RHEL
    # quanto em Debian/Ubuntu:
    linux_packages_install:
      - git
      - htop
      - tmux
    linux_packages_remove:
      - telnet
    # Grupos '@' são um conceito de RHEL (ignorados em Debian/Ubuntu):
    linux_packages_groups:
      - "@Development Tools"
    linux_packages_state: present
  roles:
    - role: linux_packages
