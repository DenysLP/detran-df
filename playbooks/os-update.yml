---
# playbooks/os-update.yml — exemplo de uso da role linux_os_update
# Funciona em RHEL 7/8/9/10 (yum/dnf/dnf5) e Debian/Ubuntu (apt), detectados automaticamente.
# AAP: survey sugerido -> linux_os_update_scope (all/security), linux_os_update_reboot (auto/true/false).

- name: Atualizar sistema operacional em hosts Linux
  hosts: linux
  become: true
  serial: "25%"
  vars:
    linux_os_update_scope: security
    linux_os_update_reboot: auto
    linux_os_update_exclude: []
  roles:
    - role: linux_os_update
