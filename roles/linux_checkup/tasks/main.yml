---
# tasks/main.yml — linux_checkup (orquestrador)
# Inventário/check-up READ-ONLY do host (RHEL / Debian / Ubuntu).
# Cada bloco em tasks/checks/*.yml faz uma verificação e adiciona linhas ao
# relatório linux_checkup_report. Nada aqui altera o sistema.

- name: Validar que o SO é suportado
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in linux_checkup_supported_families
    fail_msg: >-
      SO não suportado ({{ ansible_facts['distribution'] }}
      {{ ansible_facts['distribution_version'] }}; família
      {{ ansible_facts['os_family'] }}). Aceitos:
      {{ linux_checkup_supported_families | join(', ') }}.
  when: linux_checkup_assert_supported | bool

- name: "Carregar variáveis da família ({{ ansible_facts['os_family'] }})"
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}.yml"

- name: Inicializar relatório
  ansible.builtin.set_fact:
    linux_checkup_report: []

# Fatos de pacotes e serviços (usados por vários blocos) — read-only
- name: Coletar fatos de pacotes instalados
  ansible.builtin.package_facts:
    manager: auto

- name: Coletar fatos de serviços
  ansible.builtin.service_facts:

# Ordem do relatório = ordem do checklist
- name: Bloco — Sistema (cabeçalho/inventário)
  ansible.builtin.include_tasks: checks/system.yml
- name: Bloco — Acesso (login usuário/senha e chave SSH)
  ansible.builtin.include_tasks: checks/access.yml
- name: Bloco — Rede (interface, IP, DNS, conectividade)
  ansible.builtin.include_tasks: checks/network.yml
- name: Bloco — Disco e LVM
  ansible.builtin.include_tasks: checks/storage.yml
- name: Bloco — Atualizações do SO
  ansible.builtin.include_tasks: checks/updates.yml
- name: Bloco — Proxy
  ansible.builtin.include_tasks: checks/proxy.yml
- name: Bloco — Firewall
  ansible.builtin.include_tasks: checks/firewall.yml
- name: Bloco — Pacotes instalados
  ansible.builtin.include_tasks: checks/packages.yml
- name: Bloco — Agentes (monitoramento e NGT)
  ansible.builtin.include_tasks: checks/agents.yml
- name: Bloco — Domínio (PBIS / SSSD-AD)
  ansible.builtin.include_tasks: checks/domain.yml

- name: Exibir relatório do check-up
  ansible.builtin.debug:
    msg: "{{ linux_checkup_report }}"

- name: Gravar relatório em arquivo no host (opcional)
  ansible.builtin.copy:
    content: "{{ linux_checkup_report | join('\n') }}\n"
    dest: "{{ linux_checkup_report_path }}"
    owner: root
    group: root
    mode: "0644"
  when: linux_checkup_write_report | bool
