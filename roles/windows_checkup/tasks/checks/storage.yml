---
# checks/storage.yml — discos e volumes (equivalente a "Disco e LVM" do Linux)
# No Windows não há LVM; o análogo são discos + volumes (e Storage Spaces, se houver).

- name: Consultar discos existentes
  ansible.windows.win_powershell:
    script: |
      $Discos = Get-Disk -ErrorAction SilentlyContinue | ForEach-Object {
          [PSCustomObject]@{
              Number            = $_.Number
              FriendlyName      = $_.FriendlyName
              BusType           = "$($_.BusType)"
              PartitionStyle    = "$($_.PartitionStyle)"
              OperationalStatus = "$($_.OperationalStatus)"
              HealthStatus      = "$($_.HealthStatus)"
              SizeGB            = [math]::Round($_.Size / 1GB, 2)
              IsBoot            = [bool]$_.IsBoot
              IsSystem          = [bool]$_.IsSystem
          }
      }
      $Ansible.Result = @($Discos)
  register: resultado_discos
  failed_when: false

- name: Consultar volumes existentes
  ansible.windows.win_powershell:
    script: |
      $Volumes = Get-Volume -ErrorAction SilentlyContinue | Where-Object DriveLetter | ForEach-Object {
          [PSCustomObject]@{
              DriveLetter  = "$($_.DriveLetter):"
              FileSystem   = "$($_.FileSystem)"
              Label        = $_.FileSystemLabel
              HealthStatus = "$($_.HealthStatus)"
              SizeGB       = [math]::Round($_.Size / 1GB, 2)
              FreeSpaceGB  = [math]::Round($_.SizeRemaining / 1GB, 2)
              FreePercent  = if ($_.Size -gt 0) { [math]::Round(($_.SizeRemaining / $_.Size) * 100, 2) } else { 0 }
          }
      }
      $Ansible.Result = @($Volumes)
  register: resultado_volumes
  failed_when: false

- name: Consultar Storage Spaces (análogo a LVM, se existir)
  ansible.windows.win_powershell:
    script: |
      $Pools = Get-StoragePool -ErrorAction SilentlyContinue |
          Where-Object { -not $_.IsPrimordial } |
          ForEach-Object {
              [PSCustomObject]@{
                  FriendlyName = $_.FriendlyName
                  HealthStatus = "$($_.HealthStatus)"
                  SizeGB       = [math]::Round($_.Size / 1GB, 2)
              }
          }
      $Ansible.Result = @($Pools)
  register: resultado_storage_pools
  failed_when: false

- name: Armazenar discos, volumes e pools
  ansible.builtin.set_fact:
    discos:
      quantidade: "{{ resultado_discos.result | default([]) | length }}"
      discos: "{{ resultado_discos.result | default([]) }}"
    volumes:
      quantidade: "{{ resultado_volumes.result | default([]) | length }}"
      volumes: "{{ resultado_volumes.result | default([]) }}"
    storage_pools:
      possui: "{{ (resultado_storage_pools.result | default([]) | length) > 0 }}"
      pools: "{{ resultado_storage_pools.result | default([]) }}"
