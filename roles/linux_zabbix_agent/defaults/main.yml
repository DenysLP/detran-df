---
# defaults/main.yml — linux_zabbix_agent
# Instala e configura o zabbix-agent2 em RHEL, Debian e Ubuntu.
# A mecânica do repositório (RPM x APT) e a chave GPG ficam em vars/<os_family>.yml.

# Famílias de SO aceitas pela validação (ansible_facts['os_family'])
linux_zabbix_agent_supported_families:
  - RedHat
  - Debian

# Linha do Zabbix (repositório oficial). Garanta que a versão suporta o SO alvo.
linux_zabbix_agent_major: "7.0"

# Agente: "zabbix-agent2" (recomendado) ou "zabbix-agent" (clássico)
linux_zabbix_agent_package: zabbix-agent2
linux_zabbix_agent_service: zabbix-agent2

# --- Repositório oficial Zabbix ---
linux_zabbix_agent_manage_repo: true
linux_zabbix_agent_repo_gpgcheck: true

# --- Conexão com o Zabbix Server / Proxy ---
linux_zabbix_agent_server: "127.0.0.1"
linux_zabbix_agent_server_active: "127.0.0.1"
linux_zabbix_agent_hostname: "{{ inventory_hostname }}"

linux_zabbix_agent_listen_port: 10050
linux_zabbix_agent_listen_ip: "0.0.0.0"

# Metadados para autoregistration (opcional)
linux_zabbix_agent_host_metadata: ""

# Nível de log: 0..5 (3 = warnings)
linux_zabbix_agent_debug_level: 3

# Arquivos .conf adicionais (userparameters etc.)
linux_zabbix_agent_include: "/etc/zabbix/zabbix_agent2.d/*.conf"

# TLS (opcional): unencrypted | psk
linux_zabbix_agent_tls_connect: "unencrypted"
linux_zabbix_agent_tls_accept: "unencrypted"
linux_zabbix_agent_tls_psk_identity: ""
linux_zabbix_agent_tls_psk_secret: ""        # use ansible-vault!
linux_zabbix_agent_tls_psk_file: "/etc/zabbix/zabbix_agent2.psk"

# Abrir a porta no firewall do host (firewalld no RHEL, ufw no Debian/Ubuntu)
linux_zabbix_agent_manage_firewall: false

linux_zabbix_agent_service_enabled: true
linux_zabbix_agent_assert_supported: true
