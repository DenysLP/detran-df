---
# defaults/main.yml — rhel_os_update
# Suporta RHEL/derivados 7, 8, 9 e 10 (detecta yum/dnf/dnf5 automaticamente).

# Versões maiores aceitas pela validação
rhel_os_update_supported_majors:
  - "7"
  - "8"
  - "9"
  - "10"

# Escopo do update:
#   all      -> atualiza todos os pacotes
#   security -> aplica apenas erratas de segurança
rhel_os_update_scope: all

# Pacotes a excluir do update (ex.: ["kernel*"])
rhel_os_update_exclude: []

# Atualiza o cache do gerenciador antes de aplicar
rhel_os_update_update_cache: true

# Remove pacotes órfãos (autoremove) ao final
rhel_os_update_autoremove: false

# Reboot controlado quando o update exigir (novo kernel/glibc etc.)
#   auto -> reinicia somente se 'needs-restarting -r' sinalizar necessidade
#   true -> força reboot sempre que houver pacotes atualizados
#   false-> nunca reinicia
rhel_os_update_reboot: auto
rhel_os_update_reboot_timeout: 900
rhel_os_update_reboot_msg: "Reboot acionado pelo Ansible (rhel_os_update) após atualização do SO"

# Falha a task se o host não for RHEL da família suportada
rhel_os_update_assert_supported: true
